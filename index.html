<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="description" content="Snap, translate, and eat! Your best pocket menu manual." />
    <title>Menual</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_a_photo,compress,menu_book_2,photo_library,scan"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <div class="logo-area">
          <span class="logo-icon material-symbols-outlined" aria-hidden="true">menu_book_2</span>
          <div class="logo-text-group">
            <h1 class="logo-title">Menual</h1>
            <span class="logo-subtitle">Your manual for any menu</span>
          </div>
        </div>
      </header>

      <form id="translator-form">
        <section class="app-card">
          <div class="card-header-bar">
            <span>Translate setup</span>
            <button id="api-key-button" class="header-action-button" type="button" aria-label="Gemini settings">
              <i class="fa-solid fa-key" aria-hidden="true"></i>
              <span id="api-key-state">Flash</span>
              <i id="api-key-check" class="fa-solid fa-check key-check-icon" aria-hidden="true" hidden></i>
            </button>
          </div>
          <div class="card-body settings-stack">
            <input id="api-key" name="apiKey" type="hidden" />

            <label class="field select-field" for="target-language">
              <span>Translate to</span>
              <span class="select-control">
                <select id="target-language" name="targetLanguage"></select>
              </span>
            </label>
          </div>
        </section>

        <section class="app-card">
          <div class="card-header-bar">
            <span>Upload menu images</span>
          </div>
          <div class="card-body">
            <div class="upload-controls-row">
              <label class="upload-zone" for="image-input" aria-label="Add menu images" title="Add menu images">
                <input
                  id="image-input"
                  type="file"
                  accept="image/png,image/jpeg,image/webp,image/heic,image/heif"
                  multiple
                />
                <span class="upload-icon material-symbols-outlined" aria-hidden="true">add_a_photo</span>
              </label>
              <div class="upload-header-tools">
                <span id="payload-meter" class="payload-meter">Add images to start</span>
                <button
                  id="compress-all-button"
                  class="compress-chip"
                  type="button"
                  aria-label="Compress images"
                  title="Compress images"
                  disabled
                >
                  <span class="material-symbols-outlined" aria-hidden="true">compress</span>
                  <span>Compress</span>
                </button>
              </div>
            </div>
            <input
              id="replace-image-input"
              type="file"
              accept="image/png,image/jpeg,image/webp,image/heic,image/heif"
              hidden
            />

            <ul
              id="file-list"
              class="image-carousel"
              tabindex="-1"
              role="tablist"
              aria-label="Uploaded images"
              aria-live="polite"
            ></ul>

            <div class="action-buttons-row">
              <button id="analyze-button" class="btn-primary" type="submit">
                <span class="material-symbols-outlined" aria-hidden="true">scan</span>
                <span>Translate</span>
              </button>
              <button id="clear-button" class="btn-outline" type="button">
                <i class="fa-solid fa-trash" aria-hidden="true"></i>
                <span>Clear</span>
              </button>
            </div>
          </div>
        </section>
      </form>

      <section id="oversize-panel" class="app-card oversize-card" hidden aria-labelledby="oversize-title">
        <div class="card-header-bar warning-header">
          <span id="oversize-title">Payload is too large</span>
        </div>
        <div class="card-body">
          <p id="oversize-message" class="oversize-message"></p>
          <div class="oversize-actions">
            <button id="batch-button" class="btn-outline" type="button">Analyze safe images</button>
            <button id="compress-button" class="btn-outline" type="button">Compress images</button>
            <button id="remove-mode-button" class="btn-outline" type="button">Remove images</button>
          </div>
        </div>
      </section>

      <section class="status-live" aria-live="polite" aria-atomic="true">
        <div id="status-message" class="status-message">Ready.</div>
        <div id="progress-bar" class="progress-bar" hidden>
          <span id="progress-fill"></span>
        </div>
      </section>

      <section class="app-card results-card" aria-labelledby="results-title">
        <div class="card-header-bar">
          <span id="results-title">Results</span>
          <button id="copy-button" class="header-action-button" type="button" disabled aria-label="Copy JSON">
            <i class="fa-regular fa-copy" aria-hidden="true"></i>
            <span>JSON</span>
          </button>
        </div>
        <div class="card-body">
          <div id="results-tabs" class="chrome-tabs" role="tablist" aria-label="Image result tabs"></div>
          <div id="results-list" class="results-list" aria-live="polite"></div>
        </div>
      </section>
    </div>

    <div id="note-overlay" class="note-overlay" role="dialog" aria-modal="true" aria-labelledby="note-title" hidden>
      <div class="note-sheet">
        <button id="note-close-button" class="note-close-button" type="button" aria-label="Close note">x</button>
        <p class="note-kicker">Note</p>
        <h2 id="note-title">Menu item note</h2>
        <p id="note-text"></p>
      </div>
    </div>

    <div id="app-modal" class="app-modal" role="dialog" aria-modal="true" aria-label="Dialog" hidden>
      <div class="app-modal-panel">
        <button id="app-modal-close" class="modal-close-button" type="button" aria-label="Close window">x</button>
        <div id="app-modal-body" class="app-modal-body"></div>
        <div id="app-modal-actions" class="app-modal-actions">
          <button id="app-modal-cancel" class="modal-secondary-button" type="button">Cancel</button>
          <button id="app-modal-confirm" class="modal-primary-button" type="button">Confirm</button>
        </div>
      </div>
    </div>

    <div id="key-modal" class="app-modal" role="dialog" aria-modal="true" aria-label="Gemini settings" hidden>
      <div class="app-modal-panel">
        <button id="key-modal-close" class="modal-close-button" type="button" aria-label="Close Gemini settings">x</button>
        <div class="app-modal-body">
          <label class="field key-modal-field" for="key-modal-input">
            <span>Gemini API key</span>
            <input
              id="key-modal-input"
              type="password"
              autocomplete="off"
              placeholder="Paste your API key"
            />
          </label>
          <fieldset class="model-choice-field" id="model-choice-field">
            <legend>Default model</legend>
            <div class="model-switch">
              <label>
                <input type="radio" name="geminiModel" value="flash" />
                <span>Flash</span>
              </label>
              <label>
                <input type="radio" name="geminiModel" value="lite" />
                <span>Lite</span>
              </label>
            </div>
          </fieldset>
        </div>
        <div class="app-modal-actions">
          <button id="key-modal-clear" class="modal-secondary-button" type="button">Clear</button>
          <button id="key-modal-save" class="modal-primary-button" type="button">Save</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
